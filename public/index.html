<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Agent Chat</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    /* CSS cơ bản – bạn có thể làm đẹp hơn */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; background: #1e1e2f; color: #e0e0e0; }
    .sidebar { width: 260px; background: #16162a; padding: 20px; overflow-y: auto; }
    .sidebar h2 { color: #8ab4f8; margin-bottom: 15px; }
    #newChatBtn { background: #2a2a4a; border: none; color: white; padding: 10px; width: 100%; cursor: pointer; border-radius: 8px; }
    .main { flex: 1; display: flex; flex-direction: column; }
    .chat-container { flex: 1; overflow-y: auto; padding: 20px; }
    .input-area { padding: 15px; background: #262640; display: flex; }
    #userInput { flex: 1; padding: 12px; border-radius: 20px; border: none; background: #3a3a5c; color: white; }
    #sendBtn { margin-left: 10px; padding: 12px 20px; background: #8ab4f8; border: none; border-radius: 20px; cursor: pointer; }
    .message { margin-bottom: 15px; }
    .user .content { background: #2a2a4a; padding: 12px; border-radius: 12px; display: inline-block; max-width: 80%; }
    .assistant .content { background: #1e1e2f; padding: 12px; border-radius: 12px; display: inline-block; max-width: 80%; }
    .tool-call { background: #333; color: #aaa; font-size: 0.8em; padding: 5px; border-radius: 5px; margin: 5px 0; }
  </style>
</head>
<body>
  <div class="sidebar">
    <h2>Hội thoại</h2>
    <button id="newChatBtn">+ Chat mới</button>
    <div id="sessionList"></div>
  </div>
  <div class="main">
    <div class="chat-container" id="chatContainer"></div>
    <div class="input-area">
      <input type="text" id="userInput" placeholder="Nhập yêu cầu cho agent..." />
      <button id="sendBtn">Gửi</button>
    </div>
  </div>

  <script>
    let currentSessionId = null;
    let messages = [];

    async function newSession() {
      const res = await fetch('/api/session', { method: 'POST' });
      const data = await res.json();
      currentSessionId = data.sessionId;
      messages = [];
      document.getElementById('chatContainer').innerHTML = '';
    }

    function addMessage(role, content, isHtml = false) {
      const div = document.createElement('div');
      div.className = `message ${role}`;
      const bubble = document.createElement('div');
      bubble.className = 'content';
      if (isHtml) {
        bubble.innerHTML = content;
      } else {
        bubble.textContent = content;
      }
      div.appendChild(bubble);
      document.getElementById('chatContainer').appendChild(div);
      document.getElementById('chatContainer').scrollTop = document.getElementById('chatContainer').scrollHeight;
    }

    function addAssistantMessageStreaming() {
      const div = document.createElement('div');
      div.className = 'message assistant';
      const bubble = document.createElement('div');
      bubble.className = 'content';
      bubble.id = 'currentAssistant';
      div.appendChild(bubble);
      document.getElementById('chatContainer').appendChild(div);
      return bubble;
    }

    async function sendMessage() {
      const input = document.getElementById('userInput');
      const text = input.value.trim();
      if (!text || !currentSessionId) return;
      input.value = '';
      addMessage('user', text);
      messages.push({ role: 'user', content: text });

      const bubble = addAssistantMessageStreaming();
      let fullText = '';

      try {
        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ sessionId: currentSessionId, message: text })
        });

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop();
          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            const data = line.slice(6);
            if (data === '[DONE]') {
              break;
            }
            try {
              const parsed = JSON.parse(data);
              if (parsed.content) {
                fullText += parsed.content;
                bubble.innerHTML = marked.parse(fullText);
                document.getElementById('chatContainer').scrollTop = document.getElementById('chatContainer').scrollHeight;
              }
              if (parsed.error) {
                bubble.innerHTML += `<div class="tool-call">Lỗi: ${parsed.error}</div>`;
              }
            } catch (e) {}
          }
        }
        // Sau khi kết thúc, cập nhật messages local
        if (fullText) {
          messages.push({ role: 'assistant', content: fullText });
        }
      } catch (err) {
        bubble.textContent = 'Lỗi kết nối';
      }
    }

    document.getElementById('sendBtn').addEventListener('click', sendMessage);
    document.getElementById('userInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });
    document.getElementById('newChatBtn').addEventListener('click', newSession);

    // Khởi tạo session đầu tiên
    newSession();
  </script>
</body>
</html>
